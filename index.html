<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vector Swarm — VR</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    overflow: hidden;
    width: 100%;
    height: 100%;
    background: #02030a;
    font-family: -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  #overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: #d6f8ff;
    text-align: center;
    z-index: 10;
    background:
      radial-gradient(circle at 50% 30%, rgba(0,255,255,0.08), transparent 60%),
      #02030a;
  }
  #overlay h1 {
    font-size: 2.4rem;
    margin: 0 0 0.25rem;
    letter-spacing: 0.12em;
    color: #5ef3ff;
    text-shadow: 0 0 12px rgba(94,243,255,0.8), 0 0 30px rgba(94,243,255,0.4);
  }
  #overlay p {
    max-width: 420px;
    line-height: 1.5;
    color: #9fb6c4;
    font-size: 0.95rem;
    margin: 0.4rem 0;
  }
  #enterBtn {
    margin-top: 1.6rem;
    padding: 0.9rem 2.2rem;
    font-size: 1.1rem;
    letter-spacing: 0.08em;
    background: transparent;
    border: 2px solid #5ef3ff;
    color: #5ef3ff;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    box-shadow: 0 0 14px rgba(94,243,255,0.35) inset, 0 0 14px rgba(94,243,255,0.25);
    transition: all 0.15s ease;
  }
  #enterBtn:hover { background: rgba(94,243,255,0.12); }
  #enterBtn:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    border-color: #555;
    color: #777;
    box-shadow: none;
  }
  #status {
    margin-top: 1rem;
    font-size: 0.8rem;
    color: #ff6b6b;
    min-height: 1.2em;
  }
  #fallback2d {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
  }
  .hidden { display: none !important; }
  a { color: #5ef3ff; }
</style>
</head>
<body>

<div id="overlay">
  <h1>VECTOR SWARM</h1>
  <p>An original VR bullet-hell arcade experience. Stand in the glow. Aim with your hand. Dodge with your body.</p>
  <p id="reqMsg">Checking for VR headset…</p>
  <button id="enterBtn" disabled>Enter VR</button>
  <div id="status"></div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module" src="./game.js"></script>

</body>
</html>
